      <h1>개인정보 처리방침</h1>
      <p>세이프루트는 회원가입을 요구하지 않습니다. 저장한 스팟, 체크리스트 완료 상태, 언어 설정은 사용자의 브라우저 로컬 저장소에만 저장됩니다.</p>
      <p>현재 위치 기능은 사용자가 브라우저 권한을 허용한 경우에만 작동하며, 위치 정보는 서버로 전송하지 않습니다. 지도 표시와 거리 정렬을 위해 현재 화면에서만 사용됩니다.</p>
      <p>광고가 표시되는 경우 광고 제공자는 쿠키 또는 유사 기술을 사용할 수 있습니다. 광고 관련 설정은 사용자의 브라우저와 광고 플랫폼 설정을 따릅니다.</p>
